name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build all platforms
        run: |
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o sek_darwin_amd64  .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o sek_darwin_arm64  .
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o sek_linux_amd64   .
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o sek_linux_arm64   .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sek_darwin_amd64
            sek_darwin_arm64
            sek_linux_amd64
            sek_linux_arm64
          generate_release_notes: true
